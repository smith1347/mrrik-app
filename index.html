<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MRRIK Trading AI</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #0d0d0d; --bg2: #111111; --bg3: #181818; --bg4: #1e1e1e;
    --border: #222222; --orange: #e85d04; --orange2: #ff6b1a;
    --orange-dim: rgba(232,93,4,0.12); --text: #ffffff; --text2: #aaaaaa;
    --text3: #555555; --green: #22c55e; --green-dim: rgba(34,197,94,0.12);
    --red: #ef4444; --red-dim: rgba(239,68,68,0.12);
    --purple: #a78bfa; --purple-dim: rgba(167,139,250,0.12);
    --radius: 12px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; height: 100%; overflow: hidden; }
  body { display: flex; flex-direction: column; height: 100dvh; }
  .topbar { background: var(--bg2); border-bottom: 0.5px solid var(--border); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .logo { width: 34px; height: 34px; border-radius: 50%; background: var(--orange); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .topbar-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .topbar-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(0.7);} }
  .screen { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
  .screen::-webkit-scrollbar { display: none; }
  .balance-card { background: var(--bg2); padding: 20px 16px 16px; text-align: center; border-bottom: 0.5px solid var(--border); }
  .bal-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
  .bal-amount { font-size: 36px; font-weight: 700; color: var(--text); letter-spacing: -1px; }
  .bal-change { display: inline-flex; align-items: center; gap: 4px; margin-top: 6px; background: var(--green-dim); border: 0.5px solid rgba(34,197,94,0.2); border-radius: 20px; padding: 3px 10px; }
  .bal-change span { font-size: 12px; color: var(--green); font-weight: 500; }
  .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; background: var(--bg2); border-bottom: 0.5px solid var(--border); }
  .stat-item { padding: 12px 8px; text-align: center; border-right: 0.5px solid var(--border); }
  .stat-item:last-child { border-right: none; }
  .stat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .stat-value { font-size: 18px; font-weight: 600; }
  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }
  .stat-value.orange { color: var(--orange); }
  .section { padding: 14px 16px 0; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .section-title { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 500; }
  .section-action { font-size: 11px; color: var(--orange); cursor: pointer; }
  .trade-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; transition: background 0.15s; }
  .trade-card:active { background: var(--bg3); }
  .trade-coin { font-size: 14px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 6px; }
  .badge { font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 4px; letter-spacing: 0.3px; }
  .badge.long { background: var(--green-dim); color: var(--green); border: 0.5px solid rgba(34,197,94,0.2); }
  .badge.short { background: var(--red-dim); color: var(--red); border: 0.5px solid rgba(239,68,68,0.2); }
  .trade-detail { font-size: 11px; color: var(--text3); margin-top: 3px; }
  .trade-pnl { font-size: 14px; font-weight: 600; color: var(--green); text-align: right; }
  .trade-pct { font-size: 11px; color: var(--text3); margin-top: 2px; text-align: right; }
  .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .ctrl-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 13px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: all 0.15s; }
  .ctrl-card:active { background: var(--bg3); transform: scale(0.97); }
  .ctrl-icon { width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .ctrl-icon.orange { background: var(--orange-dim); color: var(--orange); }
  .ctrl-icon.green { background: var(--green-dim); color: var(--green); }
  .ctrl-icon.blue { background: rgba(96,165,250,0.12); color: #60a5fa; }
  .ctrl-icon.purple { background: var(--purple-dim); color: var(--purple); }
  .ctrl-icon.red { background: var(--red-dim); color: var(--red); }
  .ctrl-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .ctrl-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .risk-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 8px; }
  .risk-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px; }
  .risk-btns { display: flex; gap: 6px; }
  .risk-btn { flex: 1; padding: 8px 4px; border-radius: var(--radius-sm); border: 0.5px solid var(--border); background: transparent; color: var(--text3); font-size: 12px; font-weight: 500; cursor: pointer; text-align: center; transition: all 0.2s; }
  .risk-btn.active { border-color: var(--orange); color: var(--orange); background: var(--orange-dim); }
  .risk-desc { font-size: 11px; color: var(--text3); margin-top: 8px; line-height: 1.5; }
  .demo-banner { background: var(--purple-dim); border: 0.5px solid rgba(167,139,250,0.25); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: background 0.15s; }
  .demo-banner:active { background: rgba(167,139,250,0.2); }
  .demo-left { display: flex; align-items: center; gap: 10px; }
  .demo-title { font-size: 13px; font-weight: 500; color: var(--purple); }
  .demo-sub { font-size: 11px; color: rgba(167,139,250,0.5); margin-top: 1px; }
  .bottom-nav { background: var(--bg2); border-top: 0.5px solid var(--border); display: flex; padding: 8px 0 max(8px, env(safe-area-inset-bottom)); flex-shrink: 0; }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 4px 0; opacity: 0.35; transition: opacity 0.15s; }
  .nav-item.active { opacity: 1; }
  .nav-icon { font-size: 22px; }
  .nav-label { font-size: 9px; color: var(--text3); font-weight: 500; }
  .nav-item.active .nav-label { color: var(--orange); }
  .pill { display: inline-block; font-size: 10px; padding: 3px 8px; border-radius: 20px; font-weight: 500; }
  .pill.active { background: var(--green-dim); color: var(--green); border: 0.5px solid rgba(34,197,94,0.2); }
  .pill.paused { background: rgba(234,179,8,0.12); color: #eab308; border: 0.5px solid rgba(234,179,8,0.2); }
  .input-row { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 8px; }
  .input-lbl { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
  .amount-display { display: flex; align-items: baseline; gap: 6px; }
  .amount-curr { font-size: 20px; color: var(--text3); }
  .amount-val { font-size: 32px; font-weight: 600; color: var(--text); letter-spacing: -1px; }
  .amount-btns { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .amount-btn { padding: 7px 12px; border-radius: var(--radius-sm); border: 0.5px solid var(--border); background: var(--bg3); color: var(--text2); font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .amount-btn:active { background: var(--orange-dim); border-color: var(--orange); color: var(--orange); }
  .demo-bal-card { background: var(--purple-dim); border: 0.5px solid rgba(167,139,250,0.25); border-radius: var(--radius); padding: 16px; margin-bottom: 8px; text-align: center; }
  .demo-bal-label { font-size: 11px; color: rgba(167,139,250,0.6); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px; }
  .demo-bal-amount { font-size: 28px; font-weight: 600; color: var(--purple); }
  .demo-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .demo-stat { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 10px; text-align: center; }
  .demo-stat-l { font-size: 10px; color: var(--text3); margin-bottom: 3px; }
  .demo-stat-v { font-size: 16px; font-weight: 600; color: var(--text); }
  .settings-group { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; }
  .settings-row { display: flex; align-items: center; justify-content: space-between; padding: 13px 14px; border-bottom: 0.5px solid var(--border); cursor: pointer; transition: background 0.15s; }
  .settings-row:last-child { border-bottom: none; }
  .settings-row:active { background: var(--bg3); }
  .settings-row-left { display: flex; align-items: center; gap: 10px; }
  .settings-row-icon { width: 30px; height: 30px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 15px; }
  .trade-hist { display: flex; align-items: center; justify-content: space-between; padding: 11px 14px; border-bottom: 0.5px solid var(--border); }
  .trade-hist:last-child { border-bottom: none; }
  .hist-coin { font-size: 13px; font-weight: 500; color: var(--text); display: flex; align-items: center; gap: 6px; }
  .hist-date { font-size: 10px; color: var(--text3); margin-top: 2px; }
  .hist-pnl { font-size: 13px; font-weight: 600; text-align: right; }
  .hist-pnl.win { color: var(--green); }
  .hist-pnl.loss { color: var(--red); }
  .hist-pct { font-size: 10px; color: var(--text3); margin-top: 2px; text-align: right; }
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--bg3); border: 0.5px solid var(--border); border-radius: 20px; padding: 8px 16px; font-size: 13px; color: var(--text); opacity: 0; transition: all 0.3s; white-space: nowrap; z-index: 999; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .screen-content { animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);} }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo">MR</div>
    <div>
      <div class="topbar-title">MRRIK Trading AI</div>
      <div class="topbar-sub" id="topbar-sub">Auto-trading active</div>
    </div>
  </div>
  <div class="live-dot"></div>
</div>

<div class="screen" id="screen">
  <div class="screen-content" id="screen-content"></div>
</div>

<div class="bottom-nav">
  <div class="nav-item active" onclick="goTo('home')" id="nav-home">
    <div class="nav-icon">🏠</div>
    <div class="nav-label">Home</div>
  </div>
  <div class="nav-item" onclick="goTo('trades')" id="nav-trades">
    <div class="nav-icon">📊</div>
    <div class="nav-label">Trades</div>
  </div>
  <div class="nav-item" onclick="goTo('demo')" id="nav-demo">
    <div class="nav-icon">🎮</div>
    <div class="nav-label">Demo</div>
  </div>
  <div class="nav-item" onclick="goTo('settings')" id="nav-settings">
    <div class="nav-icon">⚙️</div>
    <div class="nav-label">Settings</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram && window.Telegram.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor('#111111'); tg.setBackgroundColor('#0d0d0d'); }

const DATA = {
  user: { name: 'Leonit', active: true, paused: false, amount: 50, risk: 'medium', connected: true },
  account: { balance: 1247.50, change: 247.50, changePct: 24.75 },
  stats: { open: 2, wins: 18, losses: 4, totalProfit: 312.40, totalLoss: 64.90 },
  openTrades: [
    { symbol: 'BTCUSDT', dir: 'LONG', entry: 67000, sl: 65000, lev: 10, pnl: 12.40, pnlPct: 8.3 },
    { symbol: 'ETHUSDT', dir: 'LONG', entry: 3200, sl: 3050, lev: 8, pnl: 6.20, pnlPct: 4.1 },
  ],
  history: [
    { symbol: 'SIRENUSDT', dir: 'LONG', date: 'Today 05:07', pnl: 4.52, pnlPct: 45.18, win: true },
    { symbol: 'MANTAUSDT', dir: 'LONG', date: 'Yesterday', pnl: 7.80, pnlPct: 38.34, win: true },
    { symbol: 'TWTUSDT', dir: 'LONG', date: 'Jun 18', pnl: -3.20, pnlPct: -14.5, win: false },
    { symbol: 'BTCUSDT', dir: 'SHORT', date: 'Jun 17', pnl: 9.10, pnlPct: 55.0, win: true },
    { symbol: 'OPUSDT', dir: 'LONG', date: 'Jun 16', pnl: -1.80, pnlPct: -9.0, win: false },
  ],
  demo: { active: true, balance: 1893.45, amount: 10, risk: 'medium', wins: 26, losses: 9, open: 5, profit: 4296.74, loss: 2775.99 },
};

function fmt(n) { return Math.abs(n).toFixed(2); }
function fmtB(n) { return n.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function goTo(s) {
  ['home','trades','demo','settings'].forEach(x => document.getElementById('nav-'+x).classList.toggle('active', x===s));
  const subs = {home:'Auto-trading active', trades:'Trade history', demo:'Demo mode', settings:'Account settings'};
  document.getElementById('topbar-sub').textContent = subs[s];
  const content = document.getElementById('screen-content');
  content.innerHTML = {home:renderHome, trades:renderTrades, demo:renderDemo, settings:renderSettings}[s]();
  document.getElementById('screen').scrollTop = 0;
}

function setRisk(mode) {
  DATA.user.risk = DATA.demo.risk = mode;
  document.querySelectorAll('.risk-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  const descs = {low:'Close 60% at TP1. Consistent and safe.', medium:'Split equally across all targets.', high:'Keep 70% open until final target. Maximum profit.'};
  document.querySelectorAll('.risk-desc').forEach(d => d.textContent = descs[mode]);
  showToast('Risk set to ' + mode);
}

function togglePause() {
  DATA.user.paused = !DATA.user.paused;
  showToast(DATA.user.paused ? '⏸ Trading paused' : '▶ Trading resumed');
  goTo(document.querySelector('.nav-item.active').id.replace('nav-',''));
}

function setAmount(v) { DATA.user.amount = v; const e = document.getElementById('amount-val'); if(e) e.textContent = v; showToast('Amount set to $'+v); }
function setDemoAmt(v) { DATA.demo.amount = v; const e = document.getElementById('demo-amt'); if(e) e.textContent = v; showToast('Demo amount set to $'+v); }

function renderHome() {
  const d = DATA;
  const riskDescs = {low:'Close 60% at TP1. Consistent and safe.',medium:'Split equally across all targets.',high:'Keep 70% open until final target.'};
  return `
    <div class="balance-card">
      <div class="bal-label">Total account value</div>
      <div class="bal-amount">$${fmtB(d.account.balance)}</div>
      <div class="bal-change"><span>+$${fmt(d.account.change)} &nbsp;+${d.account.changePct.toFixed(2)}% all time</span></div>
    </div>
    <div class="stats-row">
      <div class="stat-item"><div class="stat-label">Open</div><div class="stat-value orange">${d.stats.open}</div></div>
      <div class="stat-item"><div class="stat-label">Wins</div><div class="stat-value green">${d.stats.wins}</div></div>
      <div class="stat-item"><div class="stat-label">Losses</div><div class="stat-value red">${d.stats.losses}</div></div>
    </div>
    <div class="section" style="margin-top:14px">
      <div class="section-header"><div class="section-title">Open trades</div><div class="section-action" onclick="goTo('trades')">See all</div></div>
      ${d.openTrades.map(t=>`
      <div class="trade-card">
        <div>
          <div class="trade-coin">${t.symbol} <span class="badge ${t.dir.toLowerCase()}">${t.dir}</span></div>
          <div class="trade-detail">x${t.lev} · Entry $${t.entry.toLocaleString()} · SL $${t.sl.toLocaleString()}</div>
        </div>
        <div><div class="trade-pnl">+$${fmt(t.pnl)}</div><div class="trade-pct">+${t.pnlPct}%</div></div>
      </div>`).join('')}
    </div>
    <div class="section" style="margin-top:6px">
      <div class="section-header"><div class="section-title">Quick controls</div></div>
      <div class="controls-grid">
        <div class="ctrl-card" onclick="togglePause()">
          <div class="ctrl-icon ${d.user.paused?'green':'orange'}">${d.user.paused?'▶':'⏸'}</div>
          <div><div class="ctrl-name">${d.user.paused?'Resume':'Pause'}</div><div class="ctrl-sub">${d.user.paused?'Paused':'Active'}</div></div>
        </div>
        <div class="ctrl-card" onclick="goTo('settings')">
          <div class="ctrl-icon blue">$</div>
          <div><div class="ctrl-name">Amount</div><div class="ctrl-sub">$${d.user.amount}/trade</div></div>
        </div>
        <div class="ctrl-card" onclick="goTo('settings')">
          <div class="ctrl-icon ${d.user.connected?'green':'red'}">🔑</div>
          <div><div class="ctrl-name">Binance</div><div class="ctrl-sub">${d.user.connected?'Connected':'Not set'}</div></div>
        </div>
        <div class="ctrl-card" onclick="goTo('trades')">
          <div class="ctrl-icon purple">📈</div>
          <div><div class="ctrl-name">Statistics</div><div class="ctrl-sub">View history</div></div>
        </div>
      </div>
      <div class="risk-card">
        <div class="risk-label">Risk mode</div>
        <div class="risk-btns">
          <button class="risk-btn ${d.user.risk==='low'?'active':''}" data-mode="low" onclick="setRisk('low')">🟢 Low</button>
          <button class="risk-btn ${d.user.risk==='medium'?'active':''}" data-mode="medium" onclick="setRisk('medium')">🟡 Medium</button>
          <button class="risk-btn ${d.user.risk==='high'?'active':''}" data-mode="high" onclick="setRisk('high')">🔴 High</button>
        </div>
        <div class="risk-desc">${riskDescs[d.user.risk]}</div>
      </div>
      <div class="demo-banner" onclick="goTo('demo')">
        <div class="demo-left">
          <div style="font-size:22px">🎮</div>
          <div><div class="demo-title">Demo mode active</div><div class="demo-sub">Virtual balance: $${fmtB(d.demo.balance)}</div></div>
        </div>
        <div style="color:var(--purple);opacity:0.6;font-size:18px">›</div>
      </div>
    </div>`;
}

function renderTrades() {
  return `
    <div class="section" style="margin-top:14px">
      <div class="section-header"><div class="section-title">Open positions</div></div>
      ${DATA.openTrades.map(t=>`
      <div class="trade-card">
        <div><div class="trade-coin">${t.symbol} <span class="badge ${t.dir.toLowerCase()}">${t.dir}</span></div><div class="trade-detail">x${t.lev} · Entry $${t.entry.toLocaleString()} · SL $${t.sl.toLocaleString()}</div></div>
        <div><div class="trade-pnl">+$${fmt(t.pnl)}</div><div class="trade-pct">+${t.pnlPct}%</div></div>
      </div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 16px">
      <div style="background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center">
        <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">Total profit</div>
        <div style="font-size:20px;font-weight:600;color:var(--green)">+$${fmt(DATA.stats.totalProfit)}</div>
      </div>
      <div style="background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center">
        <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">Total loss</div>
        <div style="font-size:20px;font-weight:600;color:var(--red)">-$${fmt(DATA.stats.totalLoss)}</div>
      </div>
    </div>
    <div class="section" style="padding-top:0">
      <div class="section-header"><div class="section-title">Trade history</div></div>
      <div style="background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px">
        ${DATA.history.map(t=>`
        <div class="trade-hist">
          <div><div class="hist-coin">${t.symbol} <span class="badge ${t.dir.toLowerCase()}">${t.dir}</span></div><div class="hist-date">${t.date}</div></div>
          <div><div class="hist-pnl ${t.win?'win':'loss'}">${t.win?'+':'-'}$${fmt(t.pnl)}</div><div class="hist-pct">${t.win?'+':''}${t.pnlPct}%</div></div>
        </div>`).join('')}
      </div>
    </div>`;
}

function renderDemo() {
  const d = DATA.demo;
  const net = (d.profit - d.loss).toFixed(2);
  return `
    <div class="section" style="margin-top:14px">
