<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MRRIK Trading AI</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #0d0d0d; --bg2: #111111; --bg3: #181818; --bg4: #1e1e1e;
    --border: #222222; --orange: #e85d04; --orange2: #ff6b1a;
    --orange-dim: rgba(232,93,4,0.12); --text: #ffffff; --text2: #aaaaaa;
    --text3: #555555; --green: #22c55e; --green-dim: rgba(34,197,94,0.12);
    --red: #ef4444; --red-dim: rgba(239,68,68,0.12);
    --purple: #a78bfa; --purple-dim: rgba(167,139,250,0.12);
    --radius: 12px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; height: 100%; overflow: hidden; }
  body { display: flex; flex-direction: column; height: 100dvh; }
  .topbar { background: var(--bg2); border-bottom: 0.5px solid var(--border); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .logo { width: 34px; height: 34px; border-radius: 50%; background: var(--orange); overflow: hidden; flex-shrink: 0; }
  .topbar-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .topbar-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(0.7);} }
  .screen { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
  .screen::-webkit-scrollbar { display: none; }
  .balance-card { background: var(--bg2); padding: 20px 16px 16px; text-align: center; border-bottom: 0.5px solid var(--border); }
  .bal-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
  .bal-amount { font-size: 36px; font-weight: 700; color: var(--text); letter-spacing: -1px; }
  .bal-change { display: inline-flex; align-items: center; gap: 4px; margin-top: 6px; border-radius: 20px; padding: 3px 10px; border: 0.5px solid; }
  .bal-change span { font-size: 12px; font-weight: 500; }
  .bal-change.pos { background: var(--green-dim); border-color: rgba(34,197,94,0.2); }
  .bal-change.pos span { color: var(--green); }
  .bal-change.neg { background: var(--red-dim); border-color: rgba(239,68,68,0.2); }
  .bal-change.neg span { color: var(--red); }
  .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; background: var(--bg2); border-bottom: 0.5px solid var(--border); }
  .stat-item { padding: 12px 8px; text-align: center; border-right: 0.5px solid var(--border); }
  .stat-item:last-child { border-right: none; }
  .stat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .stat-value { font-size: 18px; font-weight: 600; }
  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }
  .stat-value.orange { color: var(--orange); }
  .section { padding: 14px 16px 0; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .section-title { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 500; }
  .section-action { font-size: 11px; color: var(--orange); cursor: pointer; }
  .trade-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; transition: background 0.15s; }
  .trade-card:active { background: var(--bg3); }
  .trade-coin { font-size: 14px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 6px; }
  .badge { font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 4px; letter-spacing: 0.3px; }
  .badge.long { background: var(--green-dim); color: var(--green); border: 0.5px solid rgba(34,197,94,0.2); }
  .badge.short { background: var(--red-dim); color: var(--red); border: 0.5px solid rgba(239,68,68,0.2); }
  .trade-detail { font-size: 11px; color: var(--text3); margin-top: 3px; }
  .trade-pnl { font-size: 14px; font-weight: 600; text-align: right; }
  .trade-pnl.pos { color: var(--green); }
  .trade-pnl.neg { color: var(--red); }
  .trade-pct { font-size: 11px; color: var(--text3); margin-top: 2px; text-align: right; }
  .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .ctrl-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 13px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: all 0.15s; }
  .ctrl-card:active { background: var(--bg3); transform: scale(0.97); }
  .ctrl-icon { width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .ctrl-icon.orange { background: var(--orange-dim); color: var(--orange); }
  .ctrl-icon.green { background: var(--green-dim); color: var(--green); }
  .ctrl-icon.blue { background: rgba(96,165,250,0.12); color: #60a5fa; }
  .ctrl-icon.purple { background: var(--purple-dim); color: var(--purple); }
  .ctrl-icon.red { background: var(--red-dim); color: var(--red); }
  .ctrl-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .ctrl-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .risk-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 8px; }
  .risk-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px; }
  .risk-btns { display: flex; gap: 6px; }
  .risk-btn { flex: 1; padding: 8px 4px; border-radius: var(--radius-sm); border: 0.5px solid var(--border); background: transparent; color: var(--text3); font-size: 12px; font-weight: 500; cursor: pointer; text-align: center; transition: all 0.2s; }
  .risk-btn.active { border-color: var(--orange); color: var(--orange); background: var(--orange-dim); }
  .risk-desc { font-size: 11px; color: var(--text3); margin-top: 8px; line-height: 1.5; }
  .demo-banner { background: var(--purple-dim); border: 0.5px solid rgba(167,139,250,0.25); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: background 0.15s; }
  .demo-banner:active { background: rgba(167,139,250,0.2); }
  .demo-left { display: flex; align-items: center; gap: 10px; }
  .demo-title { font-size: 13px; font-weight: 500; color: var(--purple); }
  .demo-sub { font-size: 11px; color: rgba(167,139,250,0.5); margin-top: 1px; }
  .bottom-nav { background: var(--bg2); border-top: 0.5px solid var(--border); display: flex; padding: 8px 0 max(8px, env(safe-area-inset-bottom)); flex-shrink: 0; }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 4px 0; opacity: 0.35; transition: opacity 0.2s; position: relative; -webkit-tap-highlight-color: transparent; }
  .nav-item.active { opacity: 1; }
  .nav-icon { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; position: relative; z-index: 1; }
  .nav-icon svg { transition: transform 0.2s ease; }
  .nav-item.active .nav-icon svg .nav-svg-stroke { stroke: var(--orange); }
  .nav-item.active .nav-icon svg .nav-svg-fill { fill: var(--orange); }
  .nav-item:not(.active) .nav-icon svg .nav-svg-stroke { stroke: #555; }
  .nav-item:not(.active) .nav-icon svg .nav-svg-fill { fill: #555; }
  .nav-label { font-size: 9px; color: #555; font-weight: 500; transition: color 0.2s; }
  .nav-item.active .nav-label { color: var(--orange); }
  /* Tap bounce animation */
  @keyframes navBounce { 0%{transform:scale(1)} 40%{transform:scale(1.25)} 70%{transform:scale(0.92)} 100%{transform:scale(1)} }
  @keyframes navRipple { 0%{transform:scale(0.3);opacity:0.5} 100%{transform:scale(2.2);opacity:0} }
  .nav-icon.bouncing svg { animation: navBounce 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards; }
  .nav-ripple { position: absolute; width: 36px; height: 36px; border-radius: 50%; background: radial-gradient(circle, rgba(232,93,4,0.35) 0%, rgba(232,93,4,0) 70%); pointer-events: none; animation: navRipple 0.5s ease-out forwards; top: 50%; left: 50%; margin-top: -18px; margin-left: -18px; z-index: 0; }
  /* Active indicator dot */
  .nav-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--orange); margin-top: 1px; opacity: 0; transition: opacity 0.2s; box-shadow: 0 0 6px rgba(232,93,4,0.6); }
  .nav-item.active .nav-dot { opacity: 1; }
  .pill { display: inline-block; font-size: 10px; padding: 3px 8px; border-radius: 20px; font-weight: 500; }
  .pill.active { background: var(--green-dim); color: var(--green); border: 0.5px solid rgba(34,197,94,0.2); }
  .pill.paused { background: rgba(234,179,8,0.12); color: #eab308; border: 0.5px solid rgba(234,179,8,0.2); }
  .pill.inactive { background: var(--red-dim); color: var(--red); border: 0.5px solid rgba(239,68,68,0.2); }
  .input-row { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 8px; }
  .input-lbl { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
  .amount-display { display: flex; align-items: baseline; gap: 6px; }
  .amount-curr { font-size: 20px; color: var(--text3); }
  .amount-val { font-size: 32px; font-weight: 600; color: var(--text); letter-spacing: -1px; }
  .amount-btns { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .amount-btn { padding: 7px 12px; border-radius: var(--radius-sm); border: 0.5px solid var(--border); background: var(--bg3); color: var(--text2); font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .amount-btn:active { background: var(--orange-dim); border-color: var(--orange); color: var(--orange); }
  .demo-bal-card { background: var(--purple-dim); border: 0.5px solid rgba(167,139,250,0.25); border-radius: var(--radius); padding: 16px; margin-bottom: 8px; text-align: center; }
  .demo-bal-label { font-size: 11px; color: rgba(167,139,250,0.6); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px; }
  .demo-bal-amount { font-size: 28px; font-weight: 600; color: var(--purple); }
  .demo-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .demo-stat { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 10px; text-align: center; }
  .demo-stat-l { font-size: 10px; color: var(--text3); margin-bottom: 3px; }
  .demo-stat-v { font-size: 16px; font-weight: 600; color: var(--text); }
  .settings-group { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; }
  .settings-row { display: flex; align-items: center; justify-content: space-between; padding: 13px 14px; border-bottom: 0.5px solid var(--border); cursor: pointer; transition: background 0.15s; }
  .settings-row:last-child { border-bottom: none; }
  .settings-row:active { background: var(--bg3); }
  .settings-row-left { display: flex; align-items: center; gap: 10px; }
  .settings-row-icon { width: 30px; height: 30px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 15px; }
  .trade-hist { display: flex; align-items: center; justify-content: space-between; padding: 11px 14px; border-bottom: 0.5px solid var(--border); }
  .trade-hist:last-child { border-bottom: none; }
  .hist-coin { font-size: 13px; font-weight: 500; color: var(--text); display: flex; align-items: center; gap: 6px; }
  .hist-date { font-size: 10px; color: var(--text3); margin-top: 2px; }
  .hist-pnl { font-size: 13px; font-weight: 600; text-align: right; }
  .hist-pnl.win { color: var(--green); }
  .hist-pnl.loss { color: var(--red); }
  .hist-pct { font-size: 10px; color: var(--text3); margin-top: 2px; text-align: right; }
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--bg3); border: 0.5px solid var(--border); border-radius: 20px; padding: 8px 16px; font-size: 13px; color: var(--text); opacity: 0; transition: all 0.3s; white-space: nowrap; z-index: 999; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  /* ── 1. SKELETON LOADING ── */
  @keyframes shimmer { 0%{background-position:-300px 0} 100%{background-position:300px 0} }
  .skel { background: linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%); background-size: 600px 100%; animation: shimmer 1.4s infinite linear; border-radius: 6px; }
  .skel-line { height: 12px; margin-bottom: 8px; }
  .skel-circle { border-radius: 50%; }
  .skel-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 8px; }

  /* ── 2. TAB SLIDE TRANSITIONS ── */
  @keyframes slideInLeft  { from{opacity:0;transform:translateX(40px)} to{opacity:1;transform:translateX(0)} }
  @keyframes slideInRight { from{opacity:0;transform:translateX(-40px)} to{opacity:1;transform:translateX(0)} }
  @keyframes slideOutLeft  { from{opacity:1;transform:translateX(0)} to{opacity:0;transform:translateX(-30px)} }
  @keyframes slideOutRight { from{opacity:1;transform:translateX(0)} to{opacity:0;transform:translateX(30px)} }
  .slide-in-left  { animation: slideInLeft  0.22s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }
  .slide-in-right { animation: slideInRight 0.22s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }

  /* ── 3. TRADE STATUS COLOR BARS ── */
  .trade-card { position: relative; overflow: hidden; }
  .trade-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; border-radius:3px 0 0 3px; }
  .trade-card.status-open::before    { background: #60a5fa; }
  .trade-card.status-profit::before  { background: var(--green); }
  .trade-card.status-loss::before    { background: var(--red); }
  .trade-card.status-neutral::before { background: var(--orange); }

  /* ── 4. ANIMATED COUNTER ── */
  @keyframes countUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .count-anim { animation: countUp 0.5s ease forwards; }

  /* ── 5. PULL TO REFRESH ── */
  .ptr-indicator { position: absolute; top: 0; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 70px; gap: 8px; transform: translateY(-70px); transition: transform 0.25s ease; pointer-events: none; z-index: 10; }
  .ptr-indicator.visible { transform: translateY(0); }
  .ptr-spinner { width: 28px; height: 28px; position: relative; }
  .ptr-candle1 { position:absolute; left:4px; bottom:4px; width:7px; border-radius:2px; background:var(--orange); opacity:0.7; }
  .ptr-candle2 { position:absolute; right:4px; top:4px; width:7px; border-radius:2px; background:var(--orange); }
  .ptr-wick1 { position:absolute; left:7px; bottom:0; width:1.5px; background:var(--orange); opacity:0.7; }
  .ptr-wick1b { position:absolute; left:7px; background:var(--orange); width:1.5px; opacity:0.7; }
  .ptr-wick2 { position:absolute; right:7px; top:0; width:1.5px; background:var(--orange); }
  .ptr-wick2b { position:absolute; right:7px; background:var(--orange); width:1.5px; }
  @keyframes ptrPulse { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(1.15)} }
  .ptr-indicator.loading .ptr-candle1,
  .ptr-indicator.loading .ptr-candle2 { animation: ptrPulse 0.6s ease-in-out infinite alternate; }
  .ptr-text { font-size: 11px; color: var(--orange); letter-spacing: 0.5px; }

  /* ── 6. CONFETTI BURST ── */
  .confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 9999; overflow: hidden; }
  @keyframes confettiFall { 0%{transform:translateY(-10px) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }
  .confetti-piece { position: absolute; width: 6px; height: 6px; border-radius: 1px; animation: confettiFall linear forwards; }

  /* ── 7. TRADE EXPAND/COLLAPSE ── */

  .trade-card-header { cursor: pointer; display: flex; align-items: center; justify-content: space-between; }

  .screen-content { animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);} }
  .loading-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; gap: 12px; }
  .loading-spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--orange); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--text3); }
  .error-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; gap: 10px; padding: 24px; text-align: center; }
  .error-icon { font-size: 36px; }
  .error-msg { font-size: 14px; color: var(--text2); line-height: 1.5; }
  .retry-btn { margin-top: 8px; padding: 10px 24px; border-radius: var(--radius); border: 0.5px solid var(--orange); background: var(--orange-dim); color: var(--orange); font-size: 13px; cursor: pointer; }
  .empty-state { text-align: center; padding: 28px 16px; color: var(--text3); font-size: 13px; }
</style>
</head>
<body>

<div class="confetti-wrap" id="confettiWrap"></div>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo"><img src="logo.jpg" style="width:100%;height:100%;object-fit:cover;border-radius:50%" onerror="this.parentElement.innerHTML='MR'" /></div>
    <div>
      <div class="topbar-title">MRRIK Trading AI</div>
      <div class="topbar-sub" id="topbar-sub">Loading...</div>
    </div>
  </div>
  <div class="live-dot" id="live-dot" style="background:var(--text3)"></div>
</div>

<div class="screen" id="screen" style="position:relative">
  <!-- Pull to refresh indicator -->
  <div class="ptr-indicator" id="ptrIndicator">
    <div class="ptr-spinner">
      <div class="ptr-candle1" style="height:14px"></div>
      <div class="ptr-wick1" style="height:5px;bottom:14px"></div>
      <div class="ptr-wick1b" style="height:4px;bottom:-4px"></div>
      <div class="ptr-candle2" style="height:18px"></div>
      <div class="ptr-wick2" style="height:4px;top:-4px"></div>
      <div class="ptr-wick2b" style="height:5px;top:18px"></div>
    </div>
    <div class="ptr-text" id="ptrText">Pull to refresh</div>
  </div>
  <div class="screen-content" id="screen-content">
    <div class="loading-wrap">
      <div class="loading-spinner"></div>
      <div class="loading-text">Connecting to MRRIK...</div>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <div class="nav-item active" onclick="navTap('home')" id="nav-home">
    <div class="nav-icon" id="navicon-home">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <!-- Candlestick chart icon (matches MRRIK logo) -->
        <rect class="nav-svg-fill" x="4" y="8" width="4" height="10" rx="1" opacity="0.7"/>
        <line class="nav-svg-stroke" x1="6" y1="5" x2="6" y2="8" stroke-width="1.5" stroke-linecap="round"/>
        <line class="nav-svg-stroke" x1="6" y1="18" x2="6" y2="21" stroke-width="1.5" stroke-linecap="round"/>
        <rect class="nav-svg-fill" x="13" y="4" width="4" height="12" rx="1"/>
        <line class="nav-svg-stroke" x1="15" y1="2" x2="15" y2="4" stroke-width="1.5" stroke-linecap="round"/>
        <line class="nav-svg-stroke" x1="15" y1="16" x2="15" y2="19" stroke-width="1.5" stroke-linecap="round"/>
        <!-- Trend line -->
        <polyline class="nav-svg-stroke" points="1,16 8,11 14,14 22,6" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.4" stroke-dasharray="2 2"/>
      </svg>
    </div>
    <div class="nav-label">Home</div>
    <div class="nav-dot"></div>
  </div>
  <div class="nav-item" onclick="navTap('trades')" id="nav-trades">
    <div class="nav-icon" id="navicon-trades">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <!-- Trade list icon -->
        <rect class="nav-svg-stroke" x="3" y="3" width="18" height="18" rx="3" stroke-width="1.5"/>
        <line class="nav-svg-stroke" x1="7" y1="8" x2="17" y2="8" stroke-width="1.5" stroke-linecap="round"/>
        <line class="nav-svg-stroke" x1="7" y1="12" x2="14" y2="12" stroke-width="1.5" stroke-linecap="round"/>
        <line class="nav-svg-stroke" x1="7" y1="16" x2="11" y2="16" stroke-width="1.5" stroke-linecap="round"/>
        <!-- Small arrow indicator -->
        <polyline class="nav-svg-stroke" points="16,14 18,12 16,10" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
      </svg>
    </div>
    <div class="nav-label">Trades</div>
    <div class="nav-dot"></div>
  </div>
  <div class="nav-item" onclick="navTap('demo')" id="nav-demo">
    <div class="nav-icon" id="navicon-demo">

<script>
// ── Telegram Mini App init ──────────────────────────
const tg = window.Telegram && window.Telegram.WebApp;

const API_BASE = 'https://mrrik.duckdns.org';

function getUserId() {

// ── State ───────────────────────────────────────────
let USER     = null;   // /api/user response

// ── Formatters ──────────────────────────────────────
function fmt(n)  { return Math.abs(parseFloat(n)).toFixed(2); }
function fmtB(n) { return parseFloat(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function fmtDate(s) {
  if (!s) return '';
  const d = new Date(s.replace(' ','T'));
  const diff = Date.now() - d;
  if (diff < 86400000) return 'Today ' + d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  if (diff < 172800000) return 'Yesterday';
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');

}

// ── API ─────────────────────────────────────────────
async function apiFetch(path) {
  const r = await fetch(`${API_BASE}${path}`);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

async function loadData(silent=false) {
  if (!USER_ID) { showError('No Telegram user detected.\nOpen this app from the MRRIK bot.'); return; }
  if (!silent) {
    document.getElementById('screen-content').innerHTML = renderSkeleton();
  }
  try {
    const [userData, statsData, realData, demoData] = await Promise.all([
      apiFetch(`/api/user?user_id=${USER_ID}`),
      apiFetch(`/api/stats?user_id=${USER_ID}`),

function showError(msg, retry=false) {
  document.getElementById('screen-content').innerHTML = `

// ── Navigation ──────────────────────────────────────

    icon.classList.add('bouncing');
    setTimeout(() => icon.classList.remove('bouncing'), 400);

    // Ripple effect
    const ripple = document.createElement('div');
    ripple.className = 'nav-ripple';
    icon.appendChild(ripple);
    setTimeout(() => ripple.remove(), 550);
  }
  goTo(tab);
}

// ── Tab order for slide direction ────────────────────

let prevTabIdx = 0;

function goTo(tab, skipAnim=false) {
  const newIdx  = TAB_ORDER.indexOf(tab);
  const goRight = newIdx > prevTabIdx;
  prevTabIdx    = newIdx;
  currentTab    = tab;
  ['home','trades','demo','settings'].forEach(x =>
    document.getElementById('nav-'+x).classList.toggle('active', x===tab));
  const subs = {home:'Auto-trading', trades:'Real trades', demo:'Demo mode', settings:'Account settings'};
  document.getElementById('topbar-sub').textContent =
    USER ? (USER.is_paused ? '⏸ Trading paused' : subs[tab]) : subs[tab];
  if (!USER) return;
  const content = document.getElementById('screen-content');
  // Remove old animation classes
  content.classList.remove('slide-in-left','slide-in-right');
  content.innerHTML = {home:renderHome, trades:renderTrades, demo:renderDemo, settings:renderSettings}[tab]();
  if (!skipAnim) {
    void content.offsetWidth;
    content.classList.add(goRight ? 'slide-in-left' : 'slide-in-right');
  }
  document.getElementById('screen').scrollTop = 0;
  // Animate counters on demo tab
  if (tab === 'demo') setTimeout(animateDemoCounters, 50);
}

// ── Animated number counter ──────────────────────────
function animateNumber(el, target, prefix='$', suffix='', duration=600) {
  if (!el) return;
  const start = 0;
  const startTime = performance.now();
  function step(now) {
    const progress = Math.min((now - startTime) / duration, 1);
    // Ease out cubic
    const eased = 1 - Math.pow(1 - progress, 3);
    const current = start + (target - start) * eased;
    el.textContent = prefix + current.toFixed(2) + suffix;
    if (progress < 1) requestAnimationFrame(step);
    else el.textContent = prefix + target.toFixed(2) + suffix;
  }
  requestAnimationFrame(step);
}

function animateDemoCounters() {
  const demo = USER && USER.demo;
  if (!demo) return;
  const balEl = document.getElementById('demo-anim-bal');
  const retEl = document.getElementById('demo-anim-ret');
  if (balEl) animateNumber(balEl, parseFloat(demo.total_value), '$');
  if (retEl) {
    const ret = parseFloat(demo.total_return);

          const tpsArr    = Array.isArray(t.tps) ? t.tps : [];

          if (tpHit && tpsArr.length > 0) {
            const splits = tpsArr.length === 1 ? [1.0]
              : tpsArr.length === 2 ? [0.5, 0.5]
              : [0.4, 0.4, 0.2];
            let cumulative = 0;
            let lastHitIdx = 0;
            for (let i = 0; i < splits.length && i < tpsArr.length; i++) {

             onclick="showAllOpen=!showAllOpen;goTo('demo',true)">

          const isPos       = profit > 0;
          const isNeg       = profit < 0;
          // Determine label based on status + partial_closed + profit
          let lbl, lblColor;
          if (t.status === 'TP_HIT') {
            lbl = '✅ Full win'; lblColor = 'var(--green)';
          } else if (t.status === 'SL_HIT' && partial > 0 && profit > 0) {
            lbl = '🟡 Partial win'; lblColor = '#eab308';
          } else if ((t.status === 'SL_HIT' || t.status === 'AUTO_CLOSED') && partial > 0 && profit === 0) {
            lbl = '🔒 Breakeven'; lblColor = '#60a5fa';
          } else if (t.status === 'AUTO_CLOSED' && partial > 0 && profit > 0) {
            lbl = '🟡 Partial win'; lblColor = '#eab308';
          } else if (t.status === 'AUTO_CLOSED') {
            lbl = '🔄 Auto-closed'; lblColor = 'var(--text3)';
          } else {
            lbl = '❌ Loss'; lblColor = 'var(--red)';
          }
          return `
          <div class="trade-hist">
            <div>
              <div class="hist-coin">${t.symbol} <span class="badge ${t.direction==='LONG'?'long':'short'}">${t.direction}</span></div>
              <div class="hist-date" style="color:${lblColor}">${lbl} &middot; ${fmtDate(t.closed_at)}</div>
            </div>
            <div>
              <div class="hist-pnl ${isPos?'win':isNeg?'loss':''}" style="${!isPos&&!isNeg?'color:#60a5fa':''}">${isPos?'+':isNeg?'-':''}$${fmt(profit)}</div>
              <div class="hist-pct">${isPos?'+':''}${parseFloat(t.profit_pct||0).toFixed(2)}%</div>
            </div>
          </div>`;
        }).join('')}

        ${showAllClosed ? '▲ Show less' : `▼ View all ${closedDemo.length} trades`}

    </div>`;
}

// ── 6. CONFETTI BURST ────────────────────────────────
function burstConfetti(x, y) {
  const wrap = document.getElementById('confettiWrap');
  if (!wrap) return;
  const colors = ['#e85d04','#ff6b1a','#22c55e','#fbbf24','#60a5fa','#a78bfa'];
  for (let i = 0; i < 22; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    const size = 4 + Math.random() * 5;
    piece.style.cssText = `
      left:${x + (Math.random()-0.5)*100}px;
      top:${y}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      width:${size}px; height:${size}px;
      border-radius:${Math.random()>0.5?'50%':'2px'};
      animation-duration:${0.9+Math.random()*0.7}s;
      animation-delay:${Math.random()*0.15}s;
    `;
    wrap.appendChild(piece);
    setTimeout(() => piece.remove(), 1800);
  }
}

document.addEventListener('click', function(e) {
  const hist = e.target.closest('.trade-hist');
  if (!hist) return;
  const pnl = hist.querySelector('.hist-pnl');
  if (pnl && pnl.classList.contains('win')) {
    const rect = hist.getBoundingClientRect();
    burstConfetti(rect.left + rect.width / 2, rect.top + rect.height / 2);
  }
});

// ── 7. TRADE EXPAND / COLLAPSE ───────────────────────
// ── 5. PULL TO REFRESH ───────────────────────────────
(function() {
  const screen  = document.getElementById('screen');
  const ptr     = document.getElementById('ptrIndicator');
  const ptrText = document.getElementById('ptrText');
  if (!screen || !ptr) return;
  let startY = 0, pulling = false, triggered = false;
  const THRESHOLD = 65;

  screen.addEventListener('touchstart', e => {
    if (screen.scrollTop === 0) {
      startY = e.touches[0].clientY;
      pulling = true; triggered = false;
    }
  }, { passive: true });

  screen.addEventListener('touchmove', e => {
    if (!pulling) return;
    const dy = e.touches[0].clientY - startY;
    if (dy > 0 && screen.scrollTop === 0) {
      const pull = Math.min(dy * 0.45, THRESHOLD + 10);
      ptr.style.transform = `translateY(${pull - 70}px)`;
      ptr.classList.add('visible');
      ptr.classList.remove('loading');
      triggered = dy > THRESHOLD * 1.8;
      ptrText.textContent = triggered ? 'Release to refresh' : 'Pull to refresh';
    }
  }, { passive: true });

  screen.addEventListener('touchend', () => {
    pulling = false;
    ptr.style.transform = '';
    if (triggered) {
      ptr.classList.add('loading');
      ptrText.textContent = 'Refreshing...';
      setTimeout(() => { ptr.classList.remove('visible','loading'); loadData(true); }, 800);
    } else {
      ptr.classList.remove('visible');
    }
  }, { passive: true });
})();

// ── TAB SWIPE GESTURE ────────────────────────────────
(function() {
  const screen = document.getElementById('screen');
  if (!screen) return;
  let sx = 0, sy = 0;
  screen.addEventListener('touchstart', e => { sx = e.touches[0].clientX; sy = e.touches[0].clientY; }, { passive:true });
  screen.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - sx;
    const dy = e.changedTouches[0].clientY - sy;
    if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
      const idx = TAB_ORDER.indexOf(currentTab);
      if (dx < 0 && idx < TAB_ORDER.length-1) navTap(TAB_ORDER[idx+1]);
      if (dx > 0 && idx > 0)                  navTap(TAB_ORDER[idx-1]);
    }
  }, { passive:true });
})();
